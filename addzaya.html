<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание заявки - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="zaya.html">Мои заявки</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-light">
                            <span class="badge bg-light text-primary">user123</span>
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="index.html">Выход</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white border-0 pt-4">
                        <h2 class="h4 mb-0">Создание новой заявки</h2>
                        <p class="text-muted small mb-0">Заполните форму для записи на курс</p>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="course_id" class="form-label fw-bold">Наименование курса <span class="text-danger">*</span></label>
                                <select class="form-select" id="course_id" required>
                                    <option value="">Выберите курс</option>
                                    <option value="1">Программирование на Python (3 месяца) - 25 000 руб.</option>
                                    <option value="2" selected>Веб-разработка на JavaScript (4 месяца) - 35 000 руб.</option>
                                    <option value="3">Data Science и машинное обучение (5 месяцев) - 45 000 руб.</option>
                                    <option value="4">Java для начинающих (3 месяца) - 28 000 руб.</option>
                                    <option value="5">Frontend-разработка (2 месяца) - 20 000 руб.</option>
                                </select>
                                <div class="form-text">Выберите курс из списка</div>
                            </div>

                            <div class="mb-3">
                                <label for="start_date" class="form-label fw-bold">Желаемая дата начала обучения <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="start_date" value="2026-08-01" required>
                                <div class="form-text">Выберите дату начала обучения</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Способ оплаты <span class="text-danger">*</span></label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" id="payment_cash" value="1" checked>
                                    <label class="form-check-label" for="payment_cash">
                                        Наличными
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" id="payment_transfer" value="2">
                                    <label class="form-check-label" for="payment_transfer">
                                        Перевод по номеру телефона
                                    </label>
                                </div>
                                <div class="form-text">Выберите удобный способ оплаты</div>
                            </div>

                            <div class="d-grid gap-2">
                                <a href="zaya.html" class="btn btn-primary">Отправить заявку</a>
                                <a href="zaya.html" class="btn btn-outline-secondary">Отмена</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
