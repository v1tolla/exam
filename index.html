<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100">
            <div class="col-md-6 col-lg-5 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-white border-0 pt-4">
                        <h1 class="h3 mb-2">Вход</h1>
                        <p class="text-muted small mb-0">Войдите в систему «Корочки.есть»</p>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="login" class="form-label fw-bold">Логин</label>
                                <input type="text" class="form-control" id="login" placeholder="Введите логин">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Пароль</label>
                                <input type="password" class="form-control" id="password" placeholder="Введите пароль">
                            </div>

                            <a href="zaya.html" class="btn btn-primary w-100">Войти</a>
                        </form>

                        <div class="text-center mt-3">
                            <p class="mb-0 small">
                                Еще не зарегистрированы? 
                                <a href="registr.html" class="text-primary fw-bold">Регистрация</a>
                            </p>
                        </div>

                        <div class="mt-2 text-center">
                            <a href="adminpanel.html" class="btn btn-outline-secondary btn-sm">Войти как администратор</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
