<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100">
            <div class="col-md-8 col-lg-6 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-white border-0 pt-4">
                        <h1 class="h3 mb-2">Регистрация</h1>
                        <p class="text-muted small mb-0">Создайте аккаунт в системе «Корочки.есть»</p>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="login" class="form-label fw-bold">Логин</label>
                                <input type="text" class="form-control" id="login" >
                                <div class="form-text">Латиница и цифры, не менее 6 символов</div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Пароль</label>
                                <input type="password" class="form-control" id="password">
                                <div class="form-text">Минимум 8 символов</div>
                            </div>

                            <div class="mb-3">
                                <label for="fio" class="form-label fw-bold">ФИО <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fio">
                                <div class="form-text">Только кириллица, пробелы и дефис</div>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label fw-bold">Телефон <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" id="phone">
                                <div class="form-text">Формат: 8(ХХХ)ХХХ-ХХ-ХХ</div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email" placeholder="example@mail.ru">
                                <div class="form-text">Введите корректный email</div>
                            </div>
                            <a href="index.html" class="btn btn-primary w-100">Зарегистрироваться</a>
                        </form>
                        <div class="text-center mt-3">
                            <p class="mb-0 small">
                                Уже есть аккаунт? 
                                <a href="index.html" class="text-primary fw-bold">Войти</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
